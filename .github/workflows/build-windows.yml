name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        # Use a single-line command: PowerShell backtick continuation under
        # YAML `|` keeps leading spaces on following lines and is fragile.
        run: >-
          pyinstaller --noconfirm --clean --windowed --onefile
          --name PDFImageCompressor
          --collect-all PyQt6 --collect-all pymupdf --collect-all PIL
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFImageCompressor-windows
          path: dist/PDFImageCompressor.exe
          if-no-files-found: error

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFImageCompressor.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
